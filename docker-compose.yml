version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: savebox_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - savebox_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: savebox_api
    restart: unless-stopped
    depends_on:
      - postgres-db
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      
      PASS_PEPPER: ${PASS_PEPPER}
      SAVEBOX_PEPPER: ${SAVEBOX_PEPPER}
      SAVEBOX_JWT_SECRET: ${SAVEBOX_JWT_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_VALIDATION_API_KEY: ${EMAIL_VALIDATION_API_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN}
      SAVEBOX_STORAGE_PATH: /app/savebox_storage/
    volumes:
      - ./savebox_storage:/app/savebox_storage
    networks:
      - savebox_network

networks:
  savebox_network:
    driver: bridge

volumes:
  pg_data: